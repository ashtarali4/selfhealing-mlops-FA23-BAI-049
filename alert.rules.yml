groups:
  - name: mlops-drift-detection
    rules:
      - alert: ModelConfidenceDrift
        expr: prediction_confidence_score < 0.653
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Model confidence has dropped below threshold"
          description: "prediction_confidence_score is below 0.653 for more than 1 minute. Triggering rollback."
